apiVersion: v1
kind: Secret
metadata:
  name: nisaba-secrets
  namespace: nisaba
  labels:
    app.kubernetes.io/name: nisaba
type: Opaque
stringData:
  # Database credentials
  SPRING_DATASOURCE_USERNAME: postgres
  SPRING_DATASOURCE_PASSWORD: changeme
  
  # API authentication (for *arr clients)
  NISABA_AUTH_USERNAME: admin
  NISABA_AUTH_PASSWORD: changeme
  
  # Node credentials (add as needed)
  # NODE_A_PASSWORD: secret123
  # NODE_B_PASSWORD: secret456
