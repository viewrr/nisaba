apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nisaba-media
  namespace: nisaba
  labels:
    app.kubernetes.io/name: nisaba
spec:
  accessModes:
    - ReadWriteMany  # Required for NFS - all nodes need access
  resources:
    requests:
      storage: 1Ti  # Adjust based on your media library size
  # Uncomment and configure for your NFS storage class
  # storageClassName: nfs-client
---
