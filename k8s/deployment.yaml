apiVersion: apps/v1
kind: Deployment
metadata:
  name: nisaba
  namespace: nisaba
  labels:
    app.kubernetes.io/name: nisaba
    app.kubernetes.io/component: server
spec:
  replicas: 1  # Nisaba is single-instance by design (no HA in v1)
  selector:
    matchLabels:
      app.kubernetes.io/name: nisaba
      app.kubernetes.io/component: server
  strategy:
    type: Recreate  # Ensure clean shutdown before new pod starts
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nisaba
        app.kubernetes.io/component: server
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: nisaba
          image: ghcr.io/viewrr/nisaba:v0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: nisaba-config
            - secretRef:
                name: nisaba-secrets
          volumeMounts:
            - name: config
              mountPath: /app/nodes.yml
              subPath: nodes.yml
              readOnly: true
            - name: media
              mountPath: /data/media
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30  # Allow up to 2.5 minutes for startup/reconciliation
      volumes:
        - name: config
          configMap:
            name: nisaba-config
        - name: media
          persistentVolumeClaim:
            claimName: nisaba-media
