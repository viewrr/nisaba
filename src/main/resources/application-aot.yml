# AOT processing profile - used during native image compilation
# Uses H2 in-memory database since AOT processing doesn't need a real database

spring:
  datasource:
    url: jdbc:h2:mem:nisaba;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  flyway:
    enabled: false  # Skip Flyway during AOT - migrations are PostgreSQL-specific
  sql:
    init:
      mode: never
