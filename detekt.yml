# Detekt Configuration for Nisaba
# https://detekt.dev/docs/introduction/configurations

build:
  maxIssues: 0
  excludeCorrectable: false
  weights:
    complexity: 2
    style: 1
    comments: 1

config:
  validation: true
  warningsAsErrors: false

complexity:
  ComplexMethod:
    threshold: 15
  LongMethod:
    threshold: 60
  LongParameterList:
    functionThreshold: 8
    constructorThreshold: 10
  TooManyFunctions:
    thresholdInFiles: 15
    thresholdInClasses: 15
    thresholdInInterfaces: 15
    thresholdInObjects: 15
    thresholdInEnums: 15

style:
  MaxLineLength:
    maxLineLength: 120
    excludeCommentStatements: true
  WildcardImport:
    active: false  # Allow wildcard imports for cleaner code
  MagicNumber:
    active: false  # Too noisy for this project
  ReturnCount:
    max: 5
  ForbiddenComment:
    active: false  # Allow TODO/FIXME comments

naming:
  FunctionNaming:
    functionPattern: '[a-zA-Z][a-zA-Z0-9]*'
  VariableNaming:
    variablePattern: '[a-z][A-Za-z0-9]*'
  PackageNaming:
    packagePattern: '[a-z]+(\.[a-z][A-Za-z0-9]*)*'

exceptions:
  TooGenericExceptionCaught:
    active: false  # Sometimes needed for error handling
  SwallowedException:
    active: true
  ThrowingExceptionsWithoutMessageOrCause:
    active: true

empty-blocks:
  EmptyFunctionBlock:
    active: true
    ignoreOverridden: true
  EmptyCatchBlock:
    active: true

potential-bugs:
  UnsafeCast:
    active: true
  UselessPostfixExpression:
    active: true
