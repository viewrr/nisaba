<svg width="100%" viewBox="0 0 680 660" xmlns="http://www.w3.org/2000/svg">
<style>
  text { font-family: 'Segoe UI', system-ui, sans-serif; }
  .th  { font-size: 14px; font-weight: 500; fill: #1a1a18; }
  .ts  { font-size: 12px; font-weight: 400; fill: #888780; }
  .arr { fill: none; stroke: #888780; stroke-width: 1.5; }
  .row { fill: #fafaf8; stroke: #d0cfc7; stroke-width: 0.3; }
  .hdr-blue   { fill: #E6F1FB; stroke: #185FA5; stroke-width: 0.5; }
  .hdr-teal   { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
  .hdr-purple { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5; }
  .hdr-amber  { fill: #FAEEDA; stroke: #854F0B; stroke-width: 0.5; }
  .hdr-blue   text, .th-blue   { fill: #0C447C; }
  .hdr-teal   text, .th-teal   { fill: #085041; }
  .hdr-purple text, .th-purple { fill: #3C3489; }
  .hdr-amber  text, .th-amber  { fill: #633806; }
  .col-name   { font-size: 12px; fill: #1a1a18; font-family: 'Segoe UI', system-ui, sans-serif; }
  .col-type   { font-size: 11px; fill: #888780; font-family: 'Segoe UI', system-ui, sans-serif; }
  .tbl-border { fill: #fafaf8; stroke: #d0cfc7; stroke-width: 0.5; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- section label: relational -->
<rect x="40" y="20" width="600" height="380" rx="12" fill="none" stroke="#d0cfc7" stroke-width="0.5" stroke-dasharray="5 3"/>
<text class="ts" x="56" y="14">PostgreSQL — relational tables</text>

<!-- TABLE: torrents header -->
<rect x="56" y="34" width="240" height="28" rx="6" class="hdr-blue"/>
<text x="176" y="52" text-anchor="middle" dominant-baseline="central" style="font-size:14px;font-weight:500;fill:#0C447C;font-family:'Segoe UI',system-ui,sans-serif;">torrents</text>

<!-- torrents body -->
<rect x="56" y="60" width="240" height="244" rx="0" class="tbl-border"/>
<rect x="56" y="60"  width="240" height="26" class="row"/>
<text x="70"  y="77" dominant-baseline="central" class="col-name">infohash</text>
<text x="288" y="77" text-anchor="end" dominant-baseline="central" class="col-type">TEXT PK</text>
<rect x="56"  y="86"  width="240" height="26" class="row"/>
<text x="70"  y="103" dominant-baseline="central" class="col-name">magnet_uri</text>
<text x="288" y="103" text-anchor="end" dominant-baseline="central" class="col-type">TEXT NOT NULL</text>
<rect x="56"  y="112" width="240" height="26" class="row"/>
<text x="70"  y="129" dominant-baseline="central" class="col-name">category</text>
<text x="288" y="129" text-anchor="end" dominant-baseline="central" class="col-type">TEXT</text>
<rect x="56"  y="138" width="240" height="26" class="row"/>
<text x="70"  y="155" dominant-baseline="central" class="col-name">save_path</text>
<text x="288" y="155" text-anchor="end" dominant-baseline="central" class="col-type">TEXT NOT NULL</text>
<rect x="56"  y="164" width="240" height="26" class="row"/>
<text x="70"  y="181" dominant-baseline="central" class="col-name">state</text>
<text x="288" y="181" text-anchor="end" dominant-baseline="central" class="col-type">torrent_state ENUM</text>
<rect x="56"  y="190" width="240" height="26" class="row"/>
<text x="70"  y="207" dominant-baseline="central" class="col-name">assigned_node_id</text>
<text x="288" y="207" text-anchor="end" dominant-baseline="central" class="col-type">TEXT FK → nodes</text>
<rect x="56"  y="216" width="240" height="26" class="row"/>
<text x="70"  y="233" dominant-baseline="central" class="col-name">progress_pct</text>
<text x="288" y="233" text-anchor="end" dominant-baseline="central" class="col-type">REAL</text>
<rect x="56"  y="242" width="240" height="26" class="row"/>
<text x="70"  y="259" dominant-baseline="central" class="col-name">pieces_bitmap</text>
<text x="288" y="259" text-anchor="end" dominant-baseline="central" class="col-type">BYTEA</text>
<rect x="56"  y="268" width="240" height="26" class="row"/>
<text x="70"  y="285" dominant-baseline="central" class="col-name">last_synced_at</text>
<text x="288" y="285" text-anchor="end" dominant-baseline="central" class="col-type">TIMESTAMPTZ</text>
<path d="M56 294 L296 294 L296 304 Q296 308 292 308 L60 308 Q56 308 56 304 Z" fill="#fafaf8" stroke="#d0cfc7" stroke-width="0.5"/>

<!-- TABLE: nodes header -->
<rect x="384" y="34" width="240" height="28" rx="6" class="hdr-teal"/>
<text x="504" y="52" text-anchor="middle" dominant-baseline="central" style="font-size:14px;font-weight:500;fill:#085041;font-family:'Segoe UI',system-ui,sans-serif;">nodes</text>

<!-- nodes body -->
<rect x="384" y="60" width="240" height="208" rx="0" class="tbl-border"/>
<rect x="384" y="60"  width="240" height="26" class="row"/>
<text x="398" y="77"  dominant-baseline="central" class="col-name">node_id</text>
<text x="616" y="77"  text-anchor="end" dominant-baseline="central" class="col-type">TEXT PK</text>
<rect x="384" y="86"  width="240" height="26" class="row"/>
<text x="398" y="103" dominant-baseline="central" class="col-name">base_url</text>
<text x="616" y="103" text-anchor="end" dominant-baseline="central" class="col-type">TEXT NOT NULL</text>
<rect x="384" y="112" width="240" height="26" class="row"/>
<text x="398" y="129" dominant-baseline="central" class="col-name">label</text>
<text x="616" y="129" text-anchor="end" dominant-baseline="central" class="col-type">TEXT</text>
<rect x="384" y="138" width="240" height="26" class="row"/>
<text x="398" y="155" dominant-baseline="central" class="col-name">healthy</text>
<text x="616" y="155" text-anchor="end" dominant-baseline="central" class="col-type">BOOLEAN</text>
<rect x="384" y="164" width="240" height="26" class="row"/>
<text x="398" y="181" dominant-baseline="central" class="col-name">ema_weight</text>
<text x="616" y="181" text-anchor="end" dominant-baseline="central" class="col-type">REAL</text>
<rect x="384" y="190" width="240" height="26" class="row"/>
<text x="398" y="207" dominant-baseline="central" class="col-name">last_speed_bps</text>
<text x="616" y="207" text-anchor="end" dominant-baseline="central" class="col-type">BIGINT</text>
<rect x="384" y="216" width="240" height="26" class="row"/>
<text x="398" y="233" dominant-baseline="central" class="col-name">last_seen_at</text>
<text x="616" y="233" text-anchor="end" dominant-baseline="central" class="col-type">TIMESTAMPTZ</text>
<path d="M384 242 L624 242 L624 252 Q624 256 620 256 L388 256 Q384 256 384 252 Z" fill="#fafaf8" stroke="#d0cfc7" stroke-width="0.5"/>

<!-- TABLE: state_transitions header -->
<rect x="384" y="272" width="240" height="28" rx="6" class="hdr-purple"/>
<text x="504" y="290" text-anchor="middle" dominant-baseline="central" style="font-size:14px;font-weight:500;fill:#3C3489;font-family:'Segoe UI',system-ui,sans-serif;">state_transitions</text>

<!-- state_transitions body -->
<rect x="384" y="298" width="240" height="98" rx="0" class="tbl-border"/>
<rect x="384" y="298" width="240" height="26" class="row"/>
<text x="398" y="315" dominant-baseline="central" class="col-name">id</text>
<text x="616" y="315" text-anchor="end" dominant-baseline="central" class="col-type">BIGSERIAL PK</text>
<rect x="384" y="324" width="240" height="26" class="row"/>
<text x="398" y="341" dominant-baseline="central" class="col-name">infohash</text>
<text x="616" y="341" text-anchor="end" dominant-baseline="central" class="col-type">TEXT FK → torrents</text>
<rect x="384" y="350" width="240" height="26" class="row"/>
<text x="398" y="367" dominant-baseline="central" class="col-name">from_state / to_state</text>
<text x="616" y="367" text-anchor="end" dominant-baseline="central" class="col-type">torrent_state ENUM</text>
<rect x="384" y="376" width="240" height="20" class="row"/>
<text x="398" y="389" dominant-baseline="central" class="col-name">reason</text>
<text x="616" y="389" text-anchor="end" dominant-baseline="central" class="col-type">TEXT</text>

<!-- ENUM callout -->
<rect x="56" y="324" width="240" height="74" rx="8" fill="none" stroke="#d0cfc7" stroke-width="0.5" stroke-dasharray="4 2"/>
<text x="176" y="344" text-anchor="middle" dominant-baseline="central" style="font-size:13px;font-weight:500;fill:#1a1a18;font-family:'Segoe UI',system-ui,sans-serif;">torrent_state ENUM</text>
<text x="176" y="362" text-anchor="middle" class="ts">queued · assigning · downloading</text>
<text x="176" y="378" text-anchor="middle" class="ts">stalled · reassigning · paused</text>
<text x="176" y="394" text-anchor="middle" class="ts">done · failed</text>

<!-- FK lines -->
<line x1="296" y1="197" x2="384" y2="140" class="arr" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<line x1="384" y1="341" x2="296" y2="120" class="arr" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- TimescaleDB section -->
<rect x="40" y="420" width="600" height="136" rx="12" fill="none" stroke="#d0cfc7" stroke-width="0.5" stroke-dasharray="5 3"/>
<text class="ts" x="56" y="414">TimescaleDB — hypertable (time-series)</text>

<!-- bandwidth_samples header -->
<rect x="56" y="434" width="280" height="28" rx="6" class="hdr-amber"/>
<text x="196" y="452" text-anchor="middle" dominant-baseline="central" style="font-size:14px;font-weight:500;fill:#633806;font-family:'Segoe UI',system-ui,sans-serif;">bandwidth_samples</text>

<!-- bandwidth_samples body -->
<rect x="56" y="460" width="280" height="82" rx="0" class="tbl-border"/>
<rect x="56" y="460" width="280" height="26" class="row"/>
<text x="70"  y="477" dominant-baseline="central" class="col-name">sampled_at</text>
<text x="328" y="477" text-anchor="end" dominant-baseline="central" class="col-type">TIMESTAMPTZ  ← partition key</text>
<rect x="56" y="486" width="280" height="26" class="row"/>
<text x="70"  y="503" dominant-baseline="central" class="col-name">node_id</text>
<text x="328" y="503" text-anchor="end" dominant-baseline="central" class="col-type">TEXT FK → nodes</text>
<rect x="56" y="512" width="280" height="26" class="row"/>
<text x="70"  y="529" dominant-baseline="central" class="col-name">speed_bps</text>
<text x="328" y="529" text-anchor="end" dominant-baseline="central" class="col-type">BIGINT</text>
<path d="M56 538 L336 538 L336 548 Q336 552 332 552 L60 552 Q56 552 56 548 Z" fill="#fafaf8" stroke="#d0cfc7" stroke-width="0.5"/>

<!-- TimescaleDB features callout -->
<rect x="368" y="434" width="256" height="116" rx="8" fill="none" stroke="#d0cfc7" stroke-width="0.5" stroke-dasharray="4 2"/>
<text x="496" y="456" text-anchor="middle" style="font-size:13px;font-weight:500;fill:#1a1a18;font-family:'Segoe UI',system-ui,sans-serif;">TimescaleDB features used</text>
<text x="384" y="476" dominant-baseline="central" class="ts">create_hypertable(chunk_time: 6h)</text>
<text x="384" y="496" dominant-baseline="central" class="ts">add_retention_policy(drop after: 48h)</text>
<text x="384" y="516" dominant-baseline="central" class="ts">time_bucket('30s') for EMA queries</text>
<text x="384" y="536" dominant-baseline="central" class="ts">no manual cron / delete needed</text>

<!-- FK: bandwidth_samples → nodes -->
<line x1="196" y1="460" x2="440" y2="256" class="arr" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- Deployment note -->
<rect x="40" y="576" width="600" height="58" rx="10" fill="none" stroke="#d0cfc7" stroke-width="0.5" stroke-dasharray="5 3"/>
<text x="340" y="598" text-anchor="middle" style="font-size:13px;font-weight:500;fill:#1a1a18;font-family:'Segoe UI',system-ui,sans-serif;">Deployment</text>
<text x="340" y="618" text-anchor="middle" class="ts">Postgres + TimescaleDB in single Incus container · Nisaba connects over Unix socket</text>

<!-- Legend -->
<line x1="56" y1="648" x2="84" y2="648" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="ts" x="90" y="652">foreign key</text>
</svg>
