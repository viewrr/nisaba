<svg width="100%" viewBox="0 0 680 780" xmlns="http://www.w3.org/2000/svg">
<style>
  text { font-family: 'Segoe UI', system-ui, sans-serif; }
  .th  { font-size: 14px; font-weight: 500; fill: #1a1a18; }
  .ts  { font-size: 12px; font-weight: 400; fill: #888780; }
  .arr { fill: none; stroke: #888780; stroke-width: 1.5; }
  .c-gray   > rect { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.5; }
  .c-gray   .th    { fill: #444441; }
  .c-gray   .ts    { fill: #5F5E5A; }
  .c-purple > rect { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5; }
  .c-purple .th    { fill: #3C3489; }
  .c-purple .ts    { fill: #534AB7; }
  .c-teal   > rect { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 1; }
  .c-teal   .th    { fill: #085041; }
  .c-teal   .ts    { fill: #0F6E56; }
  .c-amber  > rect { fill: #FAEEDA; stroke: #854F0B; stroke-width: 0.5; }
  .c-amber  .th    { fill: #633806; }
  .c-amber  .ts    { fill: #854F0B; }
  .c-red    > rect { fill: #FCEBEB; stroke: #A32D2D; stroke-width: 0.5; }
  .c-red    .th    { fill: #791F1F; }
  .c-red    .ts    { fill: #A32D2D; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- QUEUED -->
<g class="c-gray">
  <rect x="260" y="30" width="160" height="56" rx="10"/>
  <text class="th" x="340" y="52" text-anchor="middle" dominant-baseline="central">Queued</text>
  <text class="ts" x="340" y="68" text-anchor="middle" dominant-baseline="central">infohash registered, no node yet</text>
</g>
<line x1="340" y1="86" x2="340" y2="126" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="350" y="111" text-anchor="start">router picks node</text>

<!-- ASSIGNING -->
<g class="c-purple">
  <rect x="260" y="126" width="160" height="56" rx="10"/>
  <text class="th" x="340" y="148" text-anchor="middle" dominant-baseline="central">Assigning</text>
  <text class="ts" x="340" y="164" text-anchor="middle" dominant-baseline="central">add to node, await confirmation</text>
</g>
<line x1="340" y1="182" x2="340" y2="222" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="350" y="207" text-anchor="start">node confirms active</text>

<!-- DOWNLOADING -->
<g class="c-teal">
  <rect x="260" y="222" width="160" height="56" rx="10"/>
  <text class="th" x="340" y="244" text-anchor="middle" dominant-baseline="central">Downloading</text>
  <text class="ts" x="340" y="260" text-anchor="middle" dominant-baseline="central">pieces accumulate, EMA updates</text>
</g>
<!-- 30s self-loop -->
<path d="M420 242 Q470 242 470 250 Q470 258 420 258" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arrow)"/>
<text class="ts" x="476" y="250" text-anchor="start">30s sync</text>
<text class="ts" x="476" y="262" text-anchor="start">registry ← pieces bitmap</text>

<!-- downloading → stalled -->
<line x1="260" y1="278" x2="172" y2="340" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="148" y="310" text-anchor="middle">speed = 0</text>
<text class="ts" x="148" y="322" text-anchor="middle">for 2+ cycles</text>

<!-- downloading → done -->
<line x1="340" y1="278" x2="340" y2="590" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="350" y="420" text-anchor="start">progress = 100%</text>

<!-- STALLED -->
<g class="c-amber">
  <rect x="72" y="340" width="160" height="56" rx="10"/>
  <text class="th" x="152" y="362" text-anchor="middle" dominant-baseline="central">Stalled</text>
  <text class="ts" x="152" y="378" text-anchor="middle" dominant-baseline="central">node degraded or offline</text>
</g>
<line x1="152" y1="396" x2="152" y2="456" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="162" y="432" text-anchor="start">pause on old node</text>
<text class="ts" x="162" y="444" text-anchor="start">read pieces bitmap</text>

<!-- REASSIGNING -->
<g class="c-amber">
  <rect x="72" y="456" width="160" height="56" rx="10"/>
  <text class="th" x="152" y="478" text-anchor="middle" dominant-baseline="central">Reassigning</text>
  <text class="ts" x="152" y="494" text-anchor="middle" dominant-baseline="central">router picks next best node</text>
</g>
<!-- reassigning → assigning loop -->
<path d="M72 484 Q30 484 30 154 Q30 126 260 140" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="18" y="310" text-anchor="middle" transform="rotate(-90 18 310)">re-add to new node</text>

<!-- FAILED -->
<g class="c-red">
  <rect x="448" y="398" width="160" height="56" rx="10"/>
  <text class="th" x="528" y="420" text-anchor="middle" dominant-baseline="central">Failed</text>
  <text class="ts" x="528" y="436" text-anchor="middle" dominant-baseline="central">all nodes exhausted</text>
</g>
<line x1="232" y1="484" x2="448" y2="432" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="340" y="462" text-anchor="middle">no healthy node available</text>
<line x1="232" y1="368" x2="448" y2="410" class="arr" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- failed → queued manual retry -->
<path d="M608 398 Q640 200 420 46" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="ts" x="648" y="260" text-anchor="middle" transform="rotate(90 648 260)">manual retry</text>

<!-- PAUSED -->
<g class="c-gray">
  <rect x="448" y="222" width="160" height="56" rx="10"/>
  <text class="th" x="528" y="244" text-anchor="middle" dominant-baseline="central">Paused</text>
  <text class="ts" x="528" y="260" text-anchor="middle" dominant-baseline="central">*arr or user request</text>
</g>
<line x1="420" y1="250" x2="448" y2="250" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="434" y="244" text-anchor="middle">pause cmd</text>
<path d="M528 222 Q528 204 420 204 Q340 204 340 222" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="434" y="198" text-anchor="middle">resume cmd</text>

<!-- DONE -->
<g class="c-teal">
  <rect x="260" y="590" width="160" height="56" rx="10"/>
  <text class="th" x="340" y="612" text-anchor="middle" dominant-baseline="central">Done</text>
  <text class="ts" x="340" y="628" text-anchor="middle" dominant-baseline="central">seeding, file on NFS</text>
</g>

<!-- Legend -->
<rect x="60" y="694" width="560" height="68" rx="8" fill="none" stroke="#d0cfc7" stroke-width="0.5" stroke-dasharray="4 2"/>
<rect x="76" y="710" width="12" height="12" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="94" y="720">happy path</text>
<rect x="180" y="710" width="12" height="12" rx="2" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="ts" x="198" y="720">recovery path</text>
<rect x="290" y="710" width="12" height="12" rx="2" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text class="ts" x="308" y="720">terminal error</text>
<rect x="396" y="710" width="12" height="12" rx="2" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="ts" x="414" y="720">user-driven</text>
<line x1="76" y1="745" x2="108" y2="745" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
<text class="ts" x="114" y="749">state transition</text>
<line x1="240" y1="745" x2="272" y2="745" stroke="#888780" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="ts" x="278" y="749">fallback / manual</text>
</svg>
