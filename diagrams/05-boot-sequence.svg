<svg width="100%" viewBox="0 0 680 940" xmlns="http://www.w3.org/2000/svg">
<style>
  text { font-family: 'Segoe UI', system-ui, sans-serif; }
  .th  { font-size: 14px; font-weight: 500; fill: #1a1a18; }
  .ts  { font-size: 12px; font-weight: 400; fill: #888780; }
  .arr { fill: none; stroke: #888780; stroke-width: 1.5; }
  .c-gray   > rect { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.5; }
  .c-gray   .th    { fill: #444441; }
  .c-gray   .ts    { fill: #5F5E5A; }
  .c-purple > rect { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5; }
  .c-purple .th    { fill: #3C3489; }
  .c-purple .ts    { fill: #534AB7; }
  .c-teal   > rect { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 1; }
  .c-teal   .th    { fill: #085041; }
  .c-teal   .ts    { fill: #0F6E56; }
  .c-blue   > rect { fill: #E6F1FB; stroke: #185FA5; stroke-width: 0.5; }
  .c-blue   .th    { fill: #0C447C; }
  .c-blue   .ts    { fill: #185FA5; }
  .c-amber  > rect { fill: #FAEEDA; stroke: #854F0B; stroke-width: 0.5; }
  .c-amber  .th    { fill: #633806; }
  .c-amber  .ts    { fill: #854F0B; }
  .c-red    > rect { fill: #FCEBEB; stroke: #A32D2D; stroke-width: 0.5; }
  .c-red    .th    { fill: #791F1F; }
  .c-red    .ts    { fill: #A32D2D; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Phase labels -->
<text class="ts" x="34" y="66"  text-anchor="end">Phase 1</text>
<text class="ts" x="34" y="192" text-anchor="end">Phase 2</text>
<text class="ts" x="34" y="366" text-anchor="end">Phase 3</text>
<text class="ts" x="34" y="580" text-anchor="end">Phase 4</text>
<text class="ts" x="34" y="760" text-anchor="end">Phase 5</text>

<!-- Phase 1: Start + DB connect -->
<g class="c-gray">
  <rect x="250" y="30" width="180" height="52" rx="10"/>
  <text class="th" x="340" y="52" text-anchor="middle" dominant-baseline="central">Process starts</text>
  <text class="ts" x="340" y="68" text-anchor="middle" dominant-baseline="central">read config, open DB conn</text>
</g>
<line x1="340" y1="82" x2="340" y2="116" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray">
  <rect x="250" y="116" width="180" height="52" rx="10"/>
  <text class="th" x="340" y="138" text-anchor="middle" dominant-baseline="central">Run migrations</text>
  <text class="ts" x="340" y="154" text-anchor="middle" dominant-baseline="central">schema up to date?</text>
</g>
<line x1="340" y1="168" x2="340" y2="202" class="arr" marker-end="url(#arrow)"/>

<!-- Phase 2: Node health check -->
<g class="c-teal">
  <rect x="250" y="202" width="180" height="52" rx="10"/>
  <text class="th" x="340" y="224" text-anchor="middle" dominant-baseline="central">Probe all nodes</text>
  <text class="ts" x="340" y="240" text-anchor="middle" dominant-baseline="central">GET /api/v2/app/version</text>
</g>
<line x1="340" y1="254" x2="340" y2="288" class="arr" marker-end="url(#arrow)"/>

<g class="c-amber">
  <rect x="248" y="288" width="184" height="52" rx="10"/>
  <text class="th" x="340" y="310" text-anchor="middle" dominant-baseline="central">Any node healthy?</text>
  <text class="ts" x="340" y="326" text-anchor="middle" dominant-baseline="central">at least one responds</text>
</g>

<!-- NO branch -->
<line x1="248" y1="314" x2="130" y2="314" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="186" y="308" text-anchor="middle">no</text>
<g class="c-red">
  <rect x="56" y="288" width="76" height="52" rx="8"/>
  <text class="th" x="94" y="308" text-anchor="middle" dominant-baseline="central">Wait 15s</text>
  <text class="ts" x="94" y="324" text-anchor="middle" dominant-baseline="central">retry probe</text>
</g>
<path d="M94 340 Q94 370 250 370 Q280 370 280 340" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- YES continues -->
<line x1="340" y1="340" x2="340" y2="374" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="350" y="360" text-anchor="start">yes</text>

<g class="c-teal">
  <rect x="250" y="374" width="180" height="52" rx="10"/>
  <text class="th" x="340" y="396" text-anchor="middle" dominant-baseline="central">Update nodes table</text>
  <text class="ts" x="340" y="412" text-anchor="middle" dominant-baseline="central">healthy=T/F, last_seen_at</text>
</g>
<line x1="340" y1="426" x2="340" y2="460" class="arr" marker-end="url(#arrow)"/>

<!-- Phase 3 -->
<g class="c-blue">
  <rect x="250" y="460" width="180" height="52" rx="10"/>
  <text class="th" x="340" y="482" text-anchor="middle" dominant-baseline="central">Fetch live torrents</text>
  <text class="ts" x="340" y="498" text-anchor="middle" dominant-baseline="central">GET /api/v2/torrents/info</text>
</g>
<line x1="340" y1="512" x2="340" y2="546" class="arr" marker-end="url(#arrow)"/>

<!-- Phase 4: Reconcile -->
<rect x="56" y="546" width="568" height="244" rx="12" fill="none" stroke="#d0cfc7" stroke-width="0.5" stroke-dasharray="5 3"/>
<text class="ts" x="72" y="540">Reconcile registry ↔ live state (for each record in DB)</text>

<g class="c-blue">
  <rect x="72" y="560" width="156" height="60" rx="8"/>
  <text class="th" x="150" y="580" text-anchor="middle" dominant-baseline="central">Found on node</text>
  <text class="ts" x="150" y="596" text-anchor="middle" dominant-baseline="central">progress ahead of DB</text>
  <text class="ts" x="150" y="608" text-anchor="middle" dominant-baseline="central">→ update registry</text>
</g>
<g class="c-amber">
  <rect x="262" y="560" width="156" height="60" rx="8"/>
  <text class="th" x="340" y="580" text-anchor="middle" dominant-baseline="central">Not on any node</text>
  <text class="ts" x="340" y="596" text-anchor="middle" dominant-baseline="central">was downloading</text>
  <text class="ts" x="340" y="608" text-anchor="middle" dominant-baseline="central">→ mark stalled</text>
</g>
<g class="c-amber">
  <rect x="452" y="560" width="156" height="60" rx="8"/>
  <text class="th" x="530" y="580" text-anchor="middle" dominant-baseline="central">Mid-reassignment</text>
  <text class="ts" x="530" y="596" text-anchor="middle" dominant-baseline="central">state = reassigning</text>
  <text class="ts" x="530" y="608" text-anchor="middle" dominant-baseline="central">→ re-trigger assign</text>
</g>
<g class="c-gray">
  <rect x="72" y="648" width="156" height="60" rx="8"/>
  <text class="th" x="150" y="668" text-anchor="middle" dominant-baseline="central">State = done</text>
  <text class="ts" x="150" y="684" text-anchor="middle" dominant-baseline="central">verify file on NFS</text>
  <text class="ts" x="150" y="696" text-anchor="middle" dominant-baseline="central">→ no action</text>
</g>
<g class="c-purple">
  <rect x="262" y="648" width="156" height="60" rx="8"/>
  <text class="th" x="340" y="668" text-anchor="middle" dominant-baseline="central">Orphan on node</text>
  <text class="ts" x="340" y="684" text-anchor="middle" dominant-baseline="central">in node, not in DB</text>
  <text class="ts" x="340" y="696" text-anchor="middle" dominant-baseline="central">→ log, skip</text>
</g>
<g class="c-teal">
  <rect x="452" y="648" width="156" height="60" rx="8"/>
  <text class="th" x="530" y="668" text-anchor="middle" dominant-baseline="central">EMA bootstrap</text>
  <text class="ts" x="530" y="684" text-anchor="middle" dominant-baseline="central">no recent samples</text>
  <text class="ts" x="530" y="696" text-anchor="middle" dominant-baseline="central">→ seed weight = 0.5</text>
</g>

<line x1="340" y1="790" x2="340" y2="824" class="arr" marker-end="url(#arrow)"/>

<!-- Phase 5: Open API -->
<g class="c-teal">
  <rect x="200" y="824" width="280" height="52" rx="10"/>
  <text class="th" x="340" y="846" text-anchor="middle" dominant-baseline="central">Open API surface</text>
  <text class="ts" x="340" y="862" text-anchor="middle" dominant-baseline="central">begin accepting *arr requests + 30s poll loop</text>
</g>

<!-- blocking note -->
<rect x="56" y="892" width="568" height="38" rx="8" fill="none" stroke="#d0cfc7" stroke-width="0.5" stroke-dasharray="4 2"/>
<text x="340" y="907" text-anchor="middle" style="font-size:12px;fill:#888780;font-family:'Segoe UI',system-ui,sans-serif;">API is intentionally blocked until Phase 5 completes</text>
<text x="340" y="922" text-anchor="middle" style="font-size:12px;fill:#888780;font-family:'Segoe UI',system-ui,sans-serif;">*arr clients will retry — a brief delay is safer than acting on stale state</text>
</svg>
