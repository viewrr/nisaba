<svg width="100%" viewBox="0 0 680 660" xmlns="http://www.w3.org/2000/svg">
<style>
  text { font-family: 'Segoe UI', system-ui, sans-serif; }
  .th  { font-size: 14px; font-weight: 500; fill: #1a1a18; }
  .ts  { font-size: 12px; font-weight: 400; fill: #888780; }
  .arr { fill: none; stroke: #888780; stroke-width: 1.5; }
  .c-gray   > rect { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.5; }
  .c-gray   .th    { fill: #444441; }
  .c-gray   .ts    { fill: #5F5E5A; }
  .c-purple > rect { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5; }
  .c-purple .th    { fill: #3C3489; }
  .c-purple .ts    { fill: #534AB7; }
  .c-teal   > rect { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
  .c-teal   .th    { fill: #085041; }
  .c-teal   .ts    { fill: #0F6E56; }
  .c-coral  > rect { fill: #FAECE7; stroke: #993C1D; stroke-width: 0.5; }
  .c-coral  .th    { fill: #712B13; }
  .c-coral  .ts    { fill: #993C1D; }
  .c-blue   > rect { fill: #E6F1FB; stroke: #185FA5; stroke-width: 0.5; }
  .c-blue   .th    { fill: #0C447C; }
  .c-blue   .ts    { fill: #185FA5; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- *arr clients -->
<g class="c-gray">
  <rect x="60" y="30" width="130" height="52" rx="8"/>
  <text class="th" x="125" y="52" text-anchor="middle" dominant-baseline="central">Sonarr</text>
  <text class="ts" x="125" y="68" text-anchor="middle" dominant-baseline="central">TV automation</text>
</g>
<g class="c-gray">
  <rect x="490" y="30" width="130" height="52" rx="8"/>
  <text class="th" x="555" y="52" text-anchor="middle" dominant-baseline="central">Radarr</text>
  <text class="ts" x="555" y="68" text-anchor="middle" dominant-baseline="central">Movie automation</text>
</g>

<line x1="190" y1="56" x2="260" y2="140" class="arr" marker-end="url(#arrow)"/>
<line x1="490" y1="56" x2="420" y2="140" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="210" y="95" text-anchor="middle">qBit API</text>
<text class="ts" x="470" y="95" text-anchor="middle">qBit API</text>

<!-- Nisaba -->
<g class="c-purple">
  <rect x="160" y="130" width="360" height="120" rx="12"/>
  <text class="th" x="340" y="158" text-anchor="middle" dominant-baseline="central">Nisaba</text>
  <text class="ts" x="340" y="176" text-anchor="middle" dominant-baseline="central">Unified qBittorrent-compatible API surface</text>
</g>
<g class="c-purple">
  <rect x="178" y="188" width="148" height="48" rx="6"/>
  <text class="th" x="252" y="208" text-anchor="middle" dominant-baseline="central">Bandwidth monitor</text>
  <text class="ts" x="252" y="224" text-anchor="middle" dominant-baseline="central">Speed samples per node</text>
</g>
<g class="c-purple">
  <rect x="366" y="188" width="136" height="48" rx="6"/>
  <text class="th" x="434" y="208" text-anchor="middle" dominant-baseline="central">Weighted router</text>
  <text class="ts" x="434" y="224" text-anchor="middle" dominant-baseline="central">Assigns jobs by weight</text>
</g>
<text class="ts" x="340" y="220" text-anchor="middle" dominant-baseline="central">dedup</text>
<text class="ts" x="340" y="233" text-anchor="middle" dominant-baseline="central">infohash</text>
<line x1="326" y1="212" x2="364" y2="212" class="arr" marker-end="url(#arrow)"/>

<!-- Routing arrows -->
<line x1="260" y1="250" x2="200" y2="340" class="arr" marker-end="url(#arrow)"/>
<line x1="420" y1="250" x2="480" y2="340" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="198" y="300" text-anchor="middle">weight 0.7</text>
<text class="ts" x="482" y="300" text-anchor="middle">weight 0.3</text>

<!-- Node A -->
<g class="c-teal">
  <rect x="60" y="340" width="260" height="120" rx="12"/>
  <text class="th" x="190" y="368" text-anchor="middle" dominant-baseline="central">Node A — NFS host</text>
  <text class="ts" x="190" y="386" text-anchor="middle" dominant-baseline="central">Primary node, high bandwidth</text>
</g>
<g class="c-teal">
  <rect x="78" y="396" width="100" height="40" rx="6"/>
  <text class="th" x="128" y="412" text-anchor="middle" dominant-baseline="central">qBittorrent</text>
  <text class="ts" x="128" y="428" text-anchor="middle" dominant-baseline="central">:8080</text>
</g>
<g class="c-teal">
  <rect x="202" y="396" width="100" height="40" rx="6"/>
  <text class="th" x="252" y="412" text-anchor="middle" dominant-baseline="central">NFS server</text>
  <text class="ts" x="252" y="428" text-anchor="middle" dominant-baseline="central">exports /data</text>
</g>

<!-- Node B -->
<g class="c-coral">
  <rect x="360" y="340" width="260" height="120" rx="12"/>
  <text class="th" x="490" y="368" text-anchor="middle" dominant-baseline="central">Node B — Edge</text>
  <text class="ts" x="490" y="386" text-anchor="middle" dominant-baseline="central">Remote node, variable bandwidth</text>
</g>
<g class="c-coral">
  <rect x="378" y="396" width="100" height="40" rx="6"/>
  <text class="th" x="428" y="412" text-anchor="middle" dominant-baseline="central">qBittorrent</text>
  <text class="ts" x="428" y="428" text-anchor="middle" dominant-baseline="central">:8080</text>
</g>
<g class="c-coral">
  <rect x="502" y="396" width="100" height="40" rx="6"/>
  <text class="th" x="552" y="412" text-anchor="middle" dominant-baseline="central">NFS client</text>
  <text class="ts" x="552" y="428" text-anchor="middle" dominant-baseline="central">mounts /data</text>
</g>

<!-- Shared storage -->
<g class="c-blue">
  <rect x="160" y="520" width="360" height="100" rx="12"/>
  <text class="th" x="340" y="548" text-anchor="middle" dominant-baseline="central">Shared NFS — /data/media</text>
  <text class="ts" x="340" y="566" text-anchor="middle" dominant-baseline="central">Single source of truth for all downloads</text>
</g>
<g class="c-blue">
  <rect x="178" y="578" width="140" height="30" rx="6"/>
  <text class="th" x="248" y="593" text-anchor="middle" dominant-baseline="central">/movies</text>
</g>
<g class="c-blue">
  <rect x="362" y="578" width="140" height="30" rx="6"/>
  <text class="th" x="432" y="593" text-anchor="middle" dominant-baseline="central">/tv</text>
</g>

<!-- NFS arrows -->
<line x1="252" y1="460" x2="280" y2="518" class="arr" marker-end="url(#arrow)" stroke-width="1.5"/>
<line x1="552" y1="460" x2="400" y2="518" class="arr" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
<text class="ts" x="254" y="494" text-anchor="end">exports</text>
<text class="ts" x="500" y="494" text-anchor="start">mounts</text>

<!-- Speed feedback -->
<path d="M80 340 Q40 280 175 258" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<path d="M600 340 Q640 280 505 258" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="ts" x="52" y="295" text-anchor="middle">speed</text>
<text class="ts" x="52" y="308" text-anchor="middle">samples</text>
<text class="ts" x="628" y="295" text-anchor="middle">speed</text>
<text class="ts" x="628" y="308" text-anchor="middle">samples</text>

<!-- Legend -->
<line x1="60" y1="645" x2="90" y2="645" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
<text class="ts" x="96" y="649">job assignment</text>
<line x1="200" y1="645" x2="230" y2="645" stroke="#888780" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="ts" x="236" y="649">telemetry / mount</text>
</svg>
