<svg width="100%" viewBox="0 0 680 740" xmlns="http://www.w3.org/2000/svg">
<style>
  text { font-family: 'Segoe UI', system-ui, sans-serif; }
  .th  { font-size: 14px; font-weight: 500; fill: #1a1a18; }
  .ts  { font-size: 12px; font-weight: 400; fill: #888780; }
  .arr { fill: none; stroke: #888780; stroke-width: 1.5; }
  .c-gray   > rect { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.5; }
  .c-gray   .th    { fill: #444441; }
  .c-gray   .ts    { fill: #5F5E5A; }
  .c-purple > rect { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5; }
  .c-purple .th    { fill: #3C3489; }
  .c-purple .ts    { fill: #534AB7; }
  .c-teal   > rect { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
  .c-teal   .th    { fill: #085041; }
  .c-teal   .ts    { fill: #0F6E56; }
  .c-coral  > rect { fill: #FAECE7; stroke: #993C1D; stroke-width: 0.5; }
  .c-coral  .th    { fill: #712B13; }
  .c-coral  .ts    { fill: #993C1D; }
  .c-blue   > rect { fill: #E6F1FB; stroke: #185FA5; stroke-width: 0.5; }
  .c-blue   .th    { fill: #0C447C; }
  .c-blue   .ts    { fill: #185FA5; }
  .c-amber  > rect { fill: #FAEEDA; stroke: #854F0B; stroke-width: 0.5; }
  .c-amber  .th    { fill: #633806; }
  .c-amber  .ts    { fill: #854F0B; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Interceptor boundary -->
<rect x="40" y="30" width="600" height="340" rx="14" fill="none" stroke="#d0cfc7" stroke-width="0.5" stroke-dasharray="6 3"/>
<text class="ts" x="56" y="22">Nisaba boundary</text>

<!-- API surface -->
<g class="c-purple">
  <rect x="220" y="48" width="240" height="48" rx="8"/>
  <text class="th" x="340" y="68" text-anchor="middle" dominant-baseline="central">qBit-compatible API surface</text>
  <text class="ts" x="340" y="84" text-anchor="middle" dominant-baseline="central">Single endpoint for all *arr clients</text>
</g>
<line x1="340" y1="96" x2="340" y2="126" class="arr" marker-end="url(#arrow)"/>

<!-- Internal row -->
<g class="c-purple">
  <rect x="56" y="126" width="152" height="56" rx="8"/>
  <text class="th" x="132" y="148" text-anchor="middle" dominant-baseline="central">Bandwidth monitor</text>
  <text class="ts" x="132" y="164" text-anchor="middle" dominant-baseline="central">EMA weight per node</text>
</g>
<g class="c-blue">
  <rect x="264" y="126" width="152" height="56" rx="8"/>
  <text class="th" x="340" y="148" text-anchor="middle" dominant-baseline="central">Torrent registry</text>
  <text class="ts" x="340" y="164" text-anchor="middle" dominant-baseline="central">Source of truth: all jobs</text>
</g>
<g class="c-purple">
  <rect x="472" y="126" width="152" height="56" rx="8"/>
  <text class="th" x="548" y="148" text-anchor="middle" dominant-baseline="central">Weighted router</text>
  <text class="ts" x="548" y="164" text-anchor="middle" dominant-baseline="central">Assigns jobs by EMA weight</text>
</g>
<line x1="208" y1="154" x2="260" y2="154" class="arr" marker-end="url(#arrow)"/>
<line x1="416" y1="154" x2="468" y2="154" class="arr" marker-end="url(#arrow)"/>

<!-- Torrent record detail -->
<g class="c-blue">
  <rect x="56" y="214" width="568" height="130" rx="10"/>
  <text class="th" x="340" y="236" text-anchor="middle" dominant-baseline="central">Torrent record (per infohash)</text>
</g>
<g class="c-blue">
  <rect x="72" y="248" width="120" height="36" rx="6"/>
  <text class="th" x="132" y="262" text-anchor="middle" dominant-baseline="central">Identity</text>
  <text class="ts" x="132" y="276" text-anchor="middle" dominant-baseline="central">infohash, magnet, category</text>
</g>
<g class="c-blue">
  <rect x="208" y="248" width="120" height="36" rx="6"/>
  <text class="th" x="268" y="262" text-anchor="middle" dominant-baseline="central">Assignment</text>
  <text class="ts" x="268" y="276" text-anchor="middle" dominant-baseline="central">current node, save path</text>
</g>
<g class="c-blue">
  <rect x="344" y="248" width="120" height="36" rx="6"/>
  <text class="th" x="404" y="262" text-anchor="middle" dominant-baseline="central">Progress</text>
  <text class="ts" x="404" y="276" text-anchor="middle" dominant-baseline="central">% done, pieces bitmap</text>
</g>
<g class="c-blue">
  <rect x="480" y="248" width="128" height="36" rx="6"/>
  <text class="th" x="544" y="262" text-anchor="middle" dominant-baseline="central">State</text>
  <text class="ts" x="544" y="276" text-anchor="middle" dominant-baseline="central">downloading / stalled / done</text>
</g>
<text class="ts" x="340" y="318" text-anchor="middle" dominant-baseline="central">synced every 30s via polling each node's qBit API</text>

<line x1="340" y1="182" x2="340" y2="212" class="arr" stroke-dasharray="3 2" marker-end="url(#arrow)"/>

<!-- Reassignment flow -->
<rect x="40" y="396" width="600" height="90" rx="12" fill="none" stroke="#d0cfc7" stroke-width="0.5" stroke-dasharray="4 3"/>
<text class="ts" x="56" y="390">Reassignment flow (node stall / offline detected)</text>

<g class="c-amber">
  <rect x="56" y="410" width="100" height="56" rx="8"/>
  <text class="th" x="106" y="432" text-anchor="middle" dominant-baseline="central">Detect stall</text>
  <text class="ts" x="106" y="448" text-anchor="middle" dominant-baseline="central">speed = 0 / offline</text>
</g>
<line x1="156" y1="438" x2="188" y2="438" class="arr" marker-end="url(#arrow)"/>

<g class="c-blue">
  <rect x="188" y="410" width="116" height="56" rx="8"/>
  <text class="th" x="246" y="432" text-anchor="middle" dominant-baseline="central">Read registry</text>
  <text class="ts" x="246" y="448" text-anchor="middle" dominant-baseline="central">pieces bitmap + save path</text>
</g>
<line x1="304" y1="438" x2="336" y2="438" class="arr" marker-end="url(#arrow)"/>

<g class="c-purple">
  <rect x="336" y="410" width="116" height="56" rx="8"/>
  <text class="th" x="394" y="432" text-anchor="middle" dominant-baseline="central">Pick new node</text>
  <text class="ts" x="394" y="448" text-anchor="middle" dominant-baseline="central">next by EMA weight</text>
</g>
<line x1="452" y1="438" x2="484" y2="438" class="arr" marker-end="url(#arrow)"/>

<g class="c-teal">
  <rect x="484" y="410" width="140" height="56" rx="8"/>
  <text class="th" x="554" y="428" text-anchor="middle" dominant-baseline="central">Add to new node</text>
  <text class="ts" x="554" y="444" text-anchor="middle" dominant-baseline="central">same magnet + save path</text>
  <text class="ts" x="554" y="458" text-anchor="middle" dominant-baseline="central">qBit resumes from NFS</text>
</g>

<!-- Nodes -->
<g class="c-teal">
  <rect x="60" y="520" width="240" height="80" rx="10"/>
  <text class="th" x="180" y="544" text-anchor="middle" dominant-baseline="central">Node A — NFS host</text>
  <text class="ts" x="180" y="560" text-anchor="middle" dominant-baseline="central">qBittorrent + NFS server</text>
  <text class="ts" x="180" y="575" text-anchor="middle" dominant-baseline="central">writes → /data/media</text>
</g>
<g class="c-coral">
  <rect x="380" y="520" width="240" height="80" rx="10"/>
  <text class="th" x="500" y="544" text-anchor="middle" dominant-baseline="central">Node B — Edge</text>
  <text class="ts" x="500" y="560" text-anchor="middle" dominant-baseline="central">qBittorrent + NFS client</text>
  <text class="ts" x="500" y="575" text-anchor="middle" dominant-baseline="central">writes → /data/media (same)</text>
</g>

<!-- Shared storage -->
<g class="c-blue">
  <rect x="160" y="640" width="360" height="60" rx="10"/>
  <text class="th" x="340" y="664" text-anchor="middle" dominant-baseline="central">Shared NFS — /data/media</text>
  <text class="ts" x="340" y="680" text-anchor="middle" dominant-baseline="central">partial files visible to all nodes immediately</text>
</g>

<line x1="180" y1="600" x2="280" y2="638" class="arr" marker-end="url(#arrow)"/>
<line x1="500" y1="600" x2="400" y2="638" class="arr" stroke-dasharray="5 3" marker-end="url(#arrow)"/>

<!-- 30s poll feedback -->
<path d="M80 520 Q60 460 60 350" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<path d="M600 520 Q620 460 620 350" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="ts" x="30" y="440" text-anchor="middle">30s poll</text>
<text class="ts" x="650" y="440" text-anchor="middle">30s poll</text>

<!-- Legend -->
<line x1="60" y1="724" x2="88" y2="724" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
<text class="ts" x="94" y="728">data / assignment flow</text>
<line x1="240" y1="724" x2="268" y2="724" stroke="#888780" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="ts" x="274" y="728">telemetry / NFS mount</text>
</svg>
